site_name: Frugal Fortress Architecture
site_description: Enterprise AI Backend Architecture Documentation
site_author: Javier Martinez
repo_url: https://github.com/JMMAILabs/frugal-fortress-architecture
site_url: https://JMMAILabs.github.io/frugal-fortress-architecture/

theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Executive Summary: EXECUTIVE_SUMMARY.md
  - Core Architecture:
    - Architecture Whitepaper: architecture/WHITEPAPER.md
    - System Topology: architecture/SYSTEM_TOPOLOGY.md
