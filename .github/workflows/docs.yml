# .github/workflows/docs.yml
name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main  # Change to 'master' if your default branch is named master
  workflow_dispatch: # Allows manual triggering from the GitHub UI

# Sets permissions of the GITHUB_TOKEN to allow deployment to gh-pages branch
permissions:
  contents: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for accurate git-revision-date

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install MkDocs Material and any required plugins
          pip install mkdocs-material

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force